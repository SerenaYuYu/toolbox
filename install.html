<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>安裝工具箱捷徑</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #f2f2f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
  }
  .icon { font-size: 60px; margin-bottom: 16px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  p { font-size: 15px; color: #636366; line-height: 1.6; margin-bottom: 24px; }
  .btn {
    display: block;
    background: #007aff;
    color: #fff;
    padding: 16px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    text-decoration: none;
    margin-bottom: 12px;
  }
  .btn:active { opacity: 0.8; }
  .features {
    text-align: left;
    background: #f2f2f7;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .feature {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    font-size: 14px;
    color: #1c1c1e;
  }
  .note { font-size: 12px; color: #8e8e93; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🧰</div>
  <h1>工具箱捷徑</h1>
  <p>安裝後在任何 App 分享時，選單裡會出現「工具箱」選項</p>

  <div class="features">
    <div class="feature">📄 轉換為 Markdown</div>
    <div class="feature">🌐 開啟工具箱網頁</div>
    <div class="feature">📋 複製文字內容</div>
  </div>

  <a class="btn" href="shortcut/toolbox.shortcut">安裝捷徑</a>
  <p class="note">點擊後會自動跳到捷徑 App 安裝</p>
</div>
</body>
</html>

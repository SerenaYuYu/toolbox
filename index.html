<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="工具箱">
<title>宛瑜的工具箱</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --sub: #8e8e93;
    --border: #e5e5ea;
    --accent: #007aff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --text: #ffffff;
      --sub: #8e8e93;
      --border: #3a3a3c;
      --accent: #0a84ff;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    text-align: center;
  }

  header h1 { font-size: 22px; font-weight: 700; }
  header p { font-size: 14px; color: var(--sub); margin-top: 4px; }

  main {
    padding: 20px 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 0 4px 10px;
  }

  .tools {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .tool {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--card);
    text-decoration: none;
    color: var(--text);
    transition: opacity 0.15s;
  }

  .tool:active { opacity: 0.6; }

  .tool-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .tool-info { flex: 1; min-width: 0; }
  .tool-name { font-size: 15px; font-weight: 600; }
  .tool-desc { font-size: 13px; color: var(--sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tool-arrow { color: var(--sub); font-size: 18px; flex-shrink: 0; }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .badge-blue { background: #e3f0ff; color: #007aff; }
  .badge-green { background: #e3f9e9; color: #34c759; }
  .badge-purple { background: #f0eeff; color: #7c5cbf; }

  @media (prefers-color-scheme: dark) {
    .badge-blue { background: #1a3a5c; color: #0a84ff; }
    .badge-green { background: #1a3a2a; color: #30d158; }
    .badge-purple { background: #2a1a4a; color: #a97fff; }
  }

  .install-card {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
  }

  .install-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .install-icon {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: linear-gradient(135deg, #7c5cbf, #007aff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }

  .install-title { font-size: 16px; font-weight: 700; }
  .install-desc { font-size: 13px; color: var(--sub); margin-top: 3px; line-height: 1.4; }

  .features {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--sub);
  }

  .btn-install {
    display: block;
    background: var(--accent);
    color: #fff;
    padding: 13px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .btn-install:active { opacity: 0.7; }

  .hint {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--sub);
    line-height: 1.6;
    text-align: center;
  }

  .hint strong { color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>宛瑜的工具箱</h1>
  <p>常用工具一鍵開啟</p>
</header>

<main>

  <div class="section-title">捷徑</div>
  <div class="install-card">
    <div class="install-top">
      <div class="install-icon">🧰</div>
      <div>
        <div class="install-title">工具箱捷徑</div>
        <div class="install-desc">分享任何檔案時，選單裡出現工具箱選項</div>
      </div>
    </div>
    <div class="features">
      <div class="feature">📄 轉換為 Markdown</div>
      <div class="feature">🌐 開啟工具箱</div>
      <div class="feature">📋 複製文字內容</div>
    </div>
    <a class="btn-install" href="shortcut/toolbox.shortcut">安裝捷徑</a>
  </div>

  <div class="section-title">文件轉換</div>
  <div class="tools">
    <a class="tool" href="https://serenayuyu.github.io/markitdown-mobile/" target="_blank">
      <div class="tool-icon" style="background:#e8f4fd;">📄</div>
      <div class="tool-info">
        <div class="tool-name">MarkItDown 轉換工具</div>
        <div class="tool-desc">PDF、Word、CSV 轉 Markdown</div>
      </div>
      <span class="badge badge-blue">網頁版</span>
    </a>
  </div>

  <div class="section-title">AI 設定</div>
  <div class="tools">
    <a class="tool" href="https://github.com/SerenaYuYu/ai-prompts" target="_blank">
      <div class="tool-icon" style="background:#f0eeff;">🤖</div>
      <div class="tool-info">
        <div class="tool-name">AI 設定中心</div>
        <div class="tool-desc">Claude / ChatGPT 系統指令</div>
      </div>
      <span class="badge badge-purple">GitHub</span>
    </a>
    <a class="tool" href="https://github.com/SerenaYuYu/markitdown-gui" target="_blank">
      <div class="tool-icon" style="background:#fff0e8;">🖥️</div>
      <div class="tool-info">
        <div class="tool-name">MarkItDown GUI</div>
        <div class="tool-desc">Mac 桌面版，支援繁體中文</div>
      </div>
      <span class="badge badge-green">Mac</span>
    </a>
  </div>

  <div class="hint">
    加入主畫面像 App 一樣使用<br>
    Safari → <strong>分享</strong> → <strong>加入主畫面</strong>
  </div>

</main>
</body>
</html>
